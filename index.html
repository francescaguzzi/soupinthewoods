<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WebGL Forest</title>
    <link rel="stylesheet" href="lib/normalize.css">
    <link rel="stylesheet" href="lib/dat.gui.css">
    <style>
        body { margin: 0; overflow: hidden; touch-action: none; }
        canvas { display: block; width: 100%; height: 100vh; touch-action: none; }
    </style>
    </style>

    <!-- VERTEX SHADER -->
    <script id="vertex-shader" type="x-shader/x-vertex">#version 300 es
// Posizione del vertice nel modello.
layout(location = 0) in vec3 a_position;
// Coordinate UV del vertice.
layout(location = 1) in vec2 a_uv;
// Matrice per istanza: traduce, ruota e scala ogni copia del modello.
layout(location = 2) in mat4 a_instanceMatrix;
// Normale del vertice (layout location 6, dopo i 4 attributi della matrice istanza)
layout(location = 6) in vec3 a_normal;

// View matrix fornita dalla camera.
uniform mat4 u_view;
// Projection matrix prospettica.
uniform mat4 u_projection;

// UV passate al fragment shader.
out vec2 v_uv;
// Posizione mondo del vertice (passata al fragment shader per calcolo luce semplice)
out vec3 v_worldPos;
// Normale mondo del vertice (per calcoli speculari)
out vec3 v_normal;

void main() {
    // Conserva le UV originali.
    v_uv = a_uv;
    // Calcola posizione mondo usando la matrice istanza
    vec4 worldPos = a_instanceMatrix * vec4(a_position, 1.0);
    v_worldPos = worldPos.xyz;
    // Trasforma la normale in spazio mondo usando mat3 della matrice istanza
    v_normal = normalize(mat3(a_instanceMatrix) * a_normal);
    // Trasforma il vertice da spazio mondo a clip space.
    gl_Position = u_projection * u_view * worldPos;
}
</script>

    <!-- FRAGMENT SHADER -->
    <script id="fragment-shader" type="x-shader/x-fragment">#version 300 es
// Precisione dei float nel fragment shader.
precision mediump float;

// UV interpolate tra i vertici.
in vec2 v_uv;
// Posizione mondo interpolata dal vertex shader.
in vec3 v_worldPos;
// Normale mondo interpolata dal vertex shader.
in vec3 v_normal;

// Colore base del materiale.
uniform vec4 u_color;
// Indica se il materiale usa una texture.
uniform bool u_useTexture;
// Texture 2D del materiale.
uniform sampler2D u_texture;
// Abilita il taglio dei pixel trasparenti.
uniform bool u_alphaClip;
// Soglia di alpha clipping.
uniform float u_alphaThreshold;

// Fuoco: posizione, colore, intensità
uniform vec3 u_firePosition;
uniform vec3 u_fireColor;
uniform float u_fireIntensity;
// Posizione della fotocamera (worldspace) per calcolo speculare
uniform vec3 u_viewPosition;

// Colore finale scritto nel framebuffer.
out vec4 outColor;

void main() {
    // Parte dal colore del materiale.
    vec4 color = u_color;

    // Se esiste una texture, la moltiplica al colore base.
    if (u_useTexture) {
        vec4 texColor = texture(u_texture, v_uv);
        color *= texColor;
    }

    // Se il materiale richiede alpha clipping, elimina i pixel troppo trasparenti.
    if (u_alphaClip && color.a < u_alphaThreshold) {
        discard;
    }

    // === NIGHTTIME FIRE LIGHTING (Phong model: ambient + diffuse + specular) ===
    // Ambient notturno molto basso (effetto di cielo notturno)
    vec3 ambientLight = vec3(0.015, 0.018, 0.022) * color.rgb;

    // Calcolo della distanza dal fuoco e attenuazione omni-direzionale
    float dist = distance(v_worldPos, u_firePosition);
    // Attenuazione inversa quadratica con falloff graduale
    float brightness = u_fireIntensity / (1.0 + 0.08 * dist * dist);

    // Direzione verso la luce del fuoco e verso la camera
    vec3 L = normalize(u_firePosition - v_worldPos);
    vec3 V = normalize(u_viewPosition - v_worldPos);
    vec3 N = normalize(v_normal);

    // DIFFUSE (Phong): luce puntiforme diffusa basata su distanza
    vec3 diffuseLight = u_fireColor * brightness * color.rgb;

    // SPECULAR (Phong): riflessi realistici su superfici lucide
    vec3 H = normalize(L + V);
    float specularIntensity = pow(max(dot(N, H), 0.0), 32.0);
    vec3 specularLight = u_fireColor * brightness * specularIntensity * 0.6;

    // Combina: ambient notturno + diffuse dal fuoco + specular (modello Phong completo)
    vec3 finalRgb = ambientLight + diffuseLight + specularLight;
    finalRgb = clamp(finalRgb, 0.0, 1.0);
    outColor = vec4(finalRgb, color.a);
}
</script>
</head>
